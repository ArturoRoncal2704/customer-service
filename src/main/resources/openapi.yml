openapi: 3.0.3
info:
  title: Customer Service API
  description: API for managing personal and business customers in the banking system.
  version: 1.1.0
servers:
  - url: http://localhost:8080/api
    description: Local development server
tags:
  - name: Customers
    description: Operations related to customer management
paths:
  /customers:
    get:
      tags:
        - Customers
      summary: Find all customers
      description: Retrieves a list of all registered customers.
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
    post:
      tags:
        - Customers
      summary: Create a new customer
      description: Registers a new personal or business customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Invalid input data

  /customers/{id}:
    get:
      tags:
        - Customers
      summary: Find a customer by ID
      description: Retrieves a specific customer by their internal unique identifier.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the customer.
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    put:
      tags:
        - Customers
      summary: Update a customer
      description: Updates the information of an existing customer.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the customer to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Invalid input data
        '404':
          description: Customer not found
    delete:
      tags:
        - Customers
      summary: Delete a customer
      description: Removes a customer from the system. Cannot be deleted if they have active products.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the customer to delete.
          schema:
            type: string
      responses:
        '204':
          description: Customer deleted successfully
        '404':
          description: Customer not found
        '409':
          description: Conflict - Customer cannot be deleted because they have active banking products

  /customers/document/{documentNumber}:
    get:
      tags:
        - Customers
      summary: Find a customer by Document Number
      description: Retrieves a specific customer using their DNI or RUC. Essential for inter-service communication.
      parameters:
        - name: documentNumber
          in: path
          required: true
          description: The DNI (Personal) or RUC (Business) of the customer.
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found

components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier generated by MongoDB.
          example: 60d5ec49f1b2c86724353456
        type:
          $ref: '#/components/schemas/CustomerType'
        documentNumber:
          type: string
          description: DNI for personal, RUC for business.
          example: "76543210"
        name:
          type: string
          description: Full name or Business name.
          example: "Juan Perez"
        email:
          type: string
          format: email
          example: "juan.perez@email.com"
        phone:
          type: string
          example: "+51987654321"
        createdAt:
          type: string
          format: date-time
          example: "2025-08-05T14:30:00Z"

    CustomerRequest:
      type: object
      required:
        - type
        - documentNumber
        - name
        - email
      properties:
        type:
          $ref: '#/components/schemas/CustomerType'
        documentNumber:
          type: string
          example: "76543210"
        name:
          type: string
          example: "Juan Perez"
        email:
          type: string
          format: email
          example: "juan.perez@email.com"
        phone:
          type: string
          example: "+51987654321"

    CustomerType:
      type: string
      enum:
        - PERSONAL
        - BUSINESS
      description: Specifies if the customer is an individual or a company.